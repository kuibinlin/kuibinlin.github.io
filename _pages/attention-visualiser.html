<script>
  /*  ═══════════════════════════════════════════════════════════════
    ATTENTION VISUALIZER — MAIN SCRIPT
    Self-contained in the AttnEdu namespace to avoid polluting
    the global scope. All mutable state lives in `state`.
    ═══════════════════════════════════════════════════════════════ */
  const AttnEdu = (function () {
    "use strict";

    /* ────────────────────────────────────────────
     § 1  DATA — curated sentence & pre-baked numbers
     ──────────────────────────────────────────── */
    const SENTENCE = "The bank can guarantee deposits";
    const TOKENS = SENTENCE.split(" ");
    const N = TOKENS.length; // 5
    const D = 4; // embedding dimensionality (small for clarity)

    /*  Pre-baked embeddings (d=4).
      "bank" sits in an ambiguous region — financial vs. geographical.
      Financial words ("guarantee", "deposits") cluster together in the
      semantic dimensions (d₁, d₂) so the attention mechanism can pick
      them out.
      NOTE: real embeddings have hundreds of unlabelled dimensions;
      we label 4 here (d₀–d₃) purely as a teaching convenience.       */
    const E = [
      [0.9, 0.1, 0.2, 0.3], // The        — function word, low semantic
      [0.4, 0.8, 0.6, 0.5], // bank       ← ambiguous — mixed signal
      [0.7, 0.2, 0.3, 0.8], // can        — auxiliary / function word
      [0.2, 0.9, 0.8, 0.3], // guarantee  — strong financial semantic
      [0.3, 0.7, 0.9, 0.6], // deposits   — strong financial semantic
    ];

    /*  Learned weight matrices (d×d).
      Convention: Q_i = W^Q · e_i  (column-vector multiplication).
      This is equivalent to the row-vector form Q_i = e_iᵀ · (W^Q)ᵀ
      used in some textbooks. The maths is identical either way.

      These matrices are designed so that Q and K emphasise the semantic
      dimensions (d₁, d₂), causing "bank"'s query to match the keys of
      financial-context words ("guarantee", "deposits") most strongly.   */
    const WQ = [
      [-0.3, 0.1, 0.2, 0.0],
      [0.1, 1.3, -0.1, 0.2],
      [0.2, -0.2, 1.2, 0.1],
      [0.0, 0.3, 0.1, -0.2],
    ];

    const WK = [
      [0.2, 0.3, -0.1, 0.0],
      [0.1, 1.1, 0.3, -0.2],
      [-0.1, 0.2, 1.0, 0.2],
      [0.0, -0.1, 0.2, 0.3],
    ];

    const WV = [
      [0.6, 0.2, 0.1, -0.1],
      [0.1, 0.5, 0.3, 0.2],
      [0.2, 0.1, 0.7, 0.1],
      [-0.1, 0.3, 0.2, 0.6],
    ];

    /* ────────────────────────────────────────────
     § 2  LINEAR ALGEBRA HELPERS
     ──────────────────────────────────────────── */
    function matVec(M, v) {
      return M.map((row) => row.reduce((sum, w, j) => sum + w * v[j], 0));
    }
    function dot(a, b) {
      return a.reduce((sum, x, i) => sum + x * b[i], 0);
    }
    function softmax(arr) {
      const max = Math.max(...arr);
      const exps = arr.map((x) => Math.exp(x - max)); // subtract max for numerical stability
      const total = exps.reduce((a, b) => a + b, 0);
      return exps.map((x) => x / total);
    }
    function fmt(x) {
      return x.toFixed(3);
    }
    function fmt2(x) {
      return x.toFixed(2);
    }

    /* ────────────────────────────────────────────
     § 3  PRE-COMPUTE Q, K, V and attention
     ──────────────────────────────────────────── */
    const Qs = E.map((e) => matVec(WQ, e));
    const Ks = E.map((e) => matVec(WK, e));
    const Vs = E.map((e) => matVec(WV, e));

    const FOCUS = 1; // "bank" — the word we focus on in steps 4-6
    const scoresRaw = Ks.map((k) => dot(Qs[FOCUS], k) / Math.sqrt(D));
    const attnWeights = softmax(scoresRaw);

    // Full n×n attention matrix (all tokens → all tokens)
    const FULL_ATTN = E.map((_, i) => {
      const s = Ks.map((k) => dot(Qs[i], k) / Math.sqrt(D));
      return softmax(s);
    });

    // Context-aware output for "bank" = Σ α_j · V_j
    const OUTPUT_BANK = Vs[0].map((_, d) =>
      Vs.reduce((sum, v, j) => sum + attnWeights[j] * v[d], 0),
    );

    /* ────────────────────────────────────────────
     § 4  MUTABLE STATE
     ──────────────────────────────────────────── */
    const state = {
      currentStep: 0,
      highestVisited: 0, // tracks farthest step reached (for free back-navigation)
      level: "beginner",
    };

    /* ────────────────────────────────────────────
     § 5  COLOUR HELPERS
     ──────────────────────────────────────────── */

    /** Parse a CSS colour to [r,g,b].  Handles hex (#abc / #aabbcc)
      and rgb(r,g,b) / rgba(r,g,b,a).  Falls back to the accent orange. */
    function parseRGB(cssColor) {
      if (!cssColor) return [181, 69, 27];
      const s = cssColor.trim();
      // Hex
      if (s.startsWith("#")) {
        let hex = s.slice(1);
        if (hex.length === 3)
          hex = hex[0] + hex[0] + hex[1] + hex[1] + hex[2] + hex[2];
        return [
          parseInt(hex.slice(0, 2), 16),
          parseInt(hex.slice(2, 4), 16),
          parseInt(hex.slice(4, 6), 16),
        ];
      }
      // rgb / rgba
      const m = s.match(/rgba?\(\s*(\d+)\s*,\s*(\d+)\s*,\s*(\d+)/);
      if (m) return [+m[1], +m[2], +m[3]];
      return [181, 69, 27];
    }

    /** Resolve a CSS variable on #attn-edu and return [r,g,b]. */
    function accentRGB(varName) {
      const el = document.getElementById("attn-edu");
      const val = getComputedStyle(el).getPropertyValue(varName || "--accent");

    }

    function heatColor(weight) {

      return `rgba(${r},${g},${b},${(0.07 + weight * 0.88).toFixed(3)})`;
    }

    }

    /* ────────────────────────────────────────────
     § 6  STEP DEFINITIONS
     ──────────────────────────────────────────── */
    const STEPS = [
      /* ── Step 0: Intro ── */
      {

      </p>`;

      const tbody = el.querySelector("#score-tbody");
      const bestIdx = scoresRaw.indexOf(maxScore);

      TOKENS.forEach((t, j) => {
        const pct = (((scoresRaw[j] - minScore) / range) * 100).toFixed(0);
        const tr = document.createElement("tr");
        tr.innerHTML = `
        <td><span class="badge badge-k"></span><strong>${t}</strong></td>
        <td class="formula-col">${fmt(rawDots[j])}</td>
        <td class="${j === bestIdx ? "hi" : ""}"><strong>${fmt(scoresRaw[j])}</strong></td>
        <td class="score-bar-cell">
          <div class="score-mini-bg">
            <div class="score-mini-fill" style="width:${pct}%"></div>
          </div>
        </td>`;
        tbody.appendChild(tr);
      });
    }

    function renderSoftmax(el) {
      const expScores = scoresRaw.map((s) => Math.exp(s));
      const expSum = expScores.reduce((a, b) => a + b, 0);
      const bestIdx = attnWeights.indexOf(Math.max(...attnWeights));

      el.innerHTML = `
      <div class="stage-title">Step 5 of ${TOTAL_STEPS}</div>
      <div class="stage-heading">Softmax → Attention Weights</div>
      <p style="font-size:.82rem;color:var(--muted);margin-bottom:.8rem">
        Raw scores → probability distribution (must sum to 1.0):
      </p>
      <table class="score-table">
        <thead><tr>
          <th>Token</th>
          <th>Raw</th>
          <th>exp(·)</th>
          <th>Weight α</th>
          <th>%</th>
          <th class="score-bar-cell">Attention</th>
        </tr></thead>
        <tbody id="sm-tbody"></tbody>
      </table>
      <div id="sum-check" style="font-family:var(--mono);font-size:.75rem;
           color:var(--accent3);margin-top:.5rem;padding:.4rem .6rem;
           background:var(--bg);border-radius:4px;display:inline-block"></div>`;

      const tbody = el.querySelector("#sm-tbody");

      TOKENS.forEach((t, j) => {
        const w = attnWeights[j];
        const isBest = j === bestIdx;
        const tr = document.createElement("tr");
        tr.innerHTML = `
        <td><strong>${t}</strong></td>
        <td class="formula-col">${fmt(scoresRaw[j])}</td>
        <td class="formula-col">${fmt(expScores[j])}</td>
        <td class="${isBest ? "hi" : ""}"><strong>${fmt(w)}</strong></td>
        <td class="${isBest ? "hi" : ""}">${(w * 100).toFixed(1)}%</td>
        <td class="score-bar-cell">
          <div class="score-mini-bg">
            <div class="score-mini-fill" style="width:${(w * 100).toFixed(1)}%"></div>
          </div>
        </td>`;
        tbody.appendChild(tr);
      });

      const sumW = attnWeights.reduce((a, b) => a + b, 0);
      el.querySelector("#sum-check").textContent =
        `✓ Sum of weights = ${sumW.toFixed(4)} ≈ 1.0`;
    }

    function renderOutput(el) {
      const WEIGHT_THRESHOLD = 0.18; // chips above this are visually emphasised

      el.innerHTML = `
      <div class="stage-title">Step 6 of ${TOTAL_STEPS}</div>
      <div class="stage-heading">Weighted Sum → New Representation</div>
      <p style="font-size:.82rem;color:var(--muted);margin-bottom:.8rem">
        Each Value vector is scaled by its attention weight, then summed:
      </p>
      <div id="output-rows"></div>
      <div class="output-formula">
        output["bank"] = ${TOKENS.map(
          (t, j) =>
            `<span style="color:var(--accent)">${fmt(attnWeights[j])}</span>·V["${t}"]`,
        ).join(" + ")}
      </div>
      <div style="font-size:.8rem;margin-top:.8rem">
        <strong>Result</strong> — new context-aware embedding of "bank":
      </div>
      <div style="display:flex;gap:.5rem;flex-wrap:wrap;margin-top:.5rem">
        ${OUTPUT_BANK.map(
          (v, d) => `
          <div style="font-family:var(--mono);font-size:.78rem;background:var(--bg);
                      border:1.5px solid var(--accent);border-radius:5px;padding:.3rem .6rem">
            d${d}: <strong style="color:var(--accent)">${fmt(v)}</strong>
          </div>`,
        ).join("")}
      </div>
      <p class="step-footnote">
        This vector now encodes <strong>"bank" in a financial context</strong>
        — the model has successfully disambiguated it using the surrounding words.
      </p>`;

      const rowsEl = el.querySelector("#output-rows");
      TOKENS.forEach((t, j) => {
        const w = attnWeights[j];
        const row = document.createElement("div");
        row.className = "output-row";
        row.innerHTML = `
        <div class="output-label">${fmt(w)}</div>
        ${Vs[j]
          .map(
            (v) =>
              `<div class="output-chip ${w > WEIGHT_THRESHOLD ? "strong" : ""}"
                style="border-color:var(--accent);color:var(--accent)">
            ${fmt2(v)}
          </div>`,
          )
          .join("")}
        <span style="font-size:.72rem;color:var(--muted);font-family:var(--mono)">
          ← V["${t}"] × ${(w * 100).toFixed(1)}%
        </span>`;
        rowsEl.appendChild(row);
      });
    }

    function renderFullMap(el) {
      el.innerHTML = `
      <div class="stage-title">Step 7 of ${TOTAL_STEPS}</div>
      <div class="stage-heading">The Complete Attention Matrix</div>
      <p style="font-size:.82rem;color:var(--muted);margin-bottom:.8rem">
        Every token attending to every other token — hover a cell to inspect.
        Rows = queries, columns = keys.
      </p>
      <div class="heatmap-wrap">
        <table class="heatmap-table" id="hm-table"></table>
      </div>
      <div class="hm-legend">
        <span>Low</span>
        <canvas id="hm-legend-canvas" width="80" height="10" class="hm-legend-grad"></canvas>
        <span>High attention</span>
      </div>
      <p class="step-footnote" style="margin-top:1rem">
        🎉 <strong style="color:var(--text)">Congratulations!</strong> You now
        understand self-attention — the mechanism at the heart of every modern
        language model.
      </p>`;

      const table = el.querySelector("#hm-table");

      // Header row (column labels)
      const headTr = document.createElement("tr");
      headTr.appendChild(makeHMCell("", true));
      TOKENS.forEach((t) => {
        const td = makeHMCell(t, true);
        td.style.writingMode = "vertical-rl";
        td.style.transform = "rotate(180deg)";
        td.style.height = "64px";
        td.style.verticalAlign = "bottom";
        td.style.paddingBottom = "6px";
        headTr.appendChild(td);
      });
      table.appendChild(headTr);

      // Data rows
      TOKENS.forEach((rowTok, i) => {
        const tr = document.createElement("tr");
        tr.appendChild(makeHMCell(rowTok, true));
        TOKENS.forEach((colTok, j) => {
          const w = FULL_ATTN[i][j];
          const td = makeHMCell((w * 100).toFixed(0) + "%", false);
          td.style.background = heatColor(w);
          td.style.color = heatTextColor(w);
          td.addEventListener("mouseenter", (e) =>
            showTip(
              e,
              `${rowTok} → ${colTok}: ${(w * 100).toFixed(1)}% attention`,
            ),
          );
          td.addEventListener("mouseleave", hideTip);
          tr.appendChild(td);
        });
        table.appendChild(tr);
      });

      // Legend gradient
      const canvas = el.querySelector("#hm-legend-canvas");
      if (canvas) {
        const ctx = canvas.getContext("2d");
        const [r, g, b] = accentRGB("--accent");
        const grad = ctx.createLinearGradient(0, 0, 80, 0);
        grad.addColorStop(0, `rgba(${r},${g},${b},0.07)`);
        grad.addColorStop(1, `rgba(${r},${g},${b},0.95)`);
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, 80, 10);
      }
    }

    function makeHMCell(text, isHeader) {
      const td = document.createElement("td");
      td.className = "hm-cell" + (isHeader ? " hm-header" : "");
      td.textContent = text;
      return td;
    }

    /* ────────────────────────────────────────────
     § 8  TOOLTIP
     ──────────────────────────────────────────── */
    function showTip(e, text) {
      const tip = document.getElementById("edu-tip");
      if (!tip) return;
      tip.textContent = text;
      tip.classList.add("show");
      positionTip(e);
    }
    function hideTip() {
      const tip = document.getElementById("edu-tip");
      if (tip) tip.classList.remove("show");
    }
    function positionTip(e) {
      const tip = document.getElementById("edu-tip");
      if (!tip || !tip.classList.contains("show")) return;
      tip.style.left = e.clientX + 14 + "px";
      tip.style.top = e.clientY - 36 + "px";
    }
    document.addEventListener("mousemove", positionTip);

    /* ────────────────────────────────────────────
     § 9  RENDER ENGINE
     ──────────────────────────────────────────── */

    function updateProgress() {
      const prog = document.getElementById("step-progress");
      if (!prog) return;
      prog.innerHTML = "";

      STEPS.forEach((s, i) => {
        // Connector line between pips
        if (i > 0) {
          const conn = document.createElement("div");
          conn.className =
            "step-connector" + (i <= state.highestVisited ? " visited" : "");
          prog.appendChild(conn);
        }

        // Pip
        const pip = document.createElement("div");
        const isActive = i === state.currentStep;
        const isVisited =
          (i < state.currentStep || i <= state.highestVisited) && !isActive;

        pip.className =
          "step-pip" +
          (isActive ? " active" : "") +
          (isVisited ? " visited" : "");

        pip.innerHTML = `
        <div class="step-pip-circle">${isVisited && !isActive ? "✓" : i + 1}</div>
        <div class="step-pip-label">${s.shortLabel}</div>`;

        // Allow clicking any visited step or the next unvisited one
        const canNavigate = i <= state.highestVisited + 1;
        pip.style.cursor = canNavigate ? "pointer" : "default";
        pip.style.opacity = canNavigate ? "1" : "0.5";
        if (canNavigate) {
          pip.addEventListener("click", () => goToStep(i));
        }
        prog.appendChild(pip);
      });
    }

    function updateSidePanel() {
      const step = STEPS[state.currentStep];

      const explainLabel = document.getElementById("explain-label");
      const explainBody = document.getElementById("explain-body");
      const mathCard = document.getElementById("math-card");
      const mathBody = document.getElementById("math-body");

      if (explainLabel) {
        explainLabel.textContent =
          state.level === "beginner"
            ? "🌱 Plain English"
            : "⚡ Technical Detail";
      }
      if (explainBody) {
        explainBody.innerHTML = step.explain[state.level];
      }
      if (mathCard && mathBody) {
        if (step.math) {
          mathCard.style.display = "";
          mathBody.innerHTML = step.math;
        } else {
          mathCard.style.display = "none";
        }
      }
    }

    function updateNav() {
      const panel = document.getElementById("stage-panel");
      if (!panel) return;

      let nav = panel.querySelector(".nav-row");
      if (!nav) {
        nav = document.createElement("div");
        nav.className = "nav-row";
        panel.appendChild(nav);
      }

      const isFirst = state.currentStep === 0;
      const isLast = state.currentStep === TOTAL_STEPS - 1;

      nav.innerHTML = `
      <button class="nav-btn" ${isFirst ? "disabled" : ""}
              onclick="AttnEdu.go(-1)">← Back</button>
      <span class="step-counter">${state.currentStep + 1} / ${TOTAL_STEPS}</span>
      <button class="nav-btn primary" ${isLast ? "disabled" : ""}
              onclick="AttnEdu.go(1)">
        ${isLast ? "✓ Complete" : "Next →"}
      </button>`;
    }

    function render() {
      updateProgress();

      const panel = document.getElementById("stage-panel");
      if (!panel) return;

      // Trigger re-animation
      panel.style.animation = "none";
      panel.offsetHeight; // force reflow
      panel.style.animation = "";

      STEPS[state.currentStep].render(panel);
      updateNav();
      updateSidePanel();

      // On mobile, scroll the stage into view
      if (window.innerWidth < 780) {
        panel.scrollIntoView({ behavior: "smooth", block: "start" });
      }
    }

    /* ────────────────────────────────────────────
     § 10  PUBLIC API
     ──────────────────────────────────────────── */

    function goToStep(idx) {
      if (idx < 0 || idx >= TOTAL_STEPS) return;
      state.currentStep = idx;
      if (idx > state.highestVisited) state.highestVisited = idx;
      render();
    }

    function go(dir) {
      goToStep(state.currentStep + dir);
    }

    function setLevel(l) {
      state.level = l;
      const btnB = document.getElementById("btn-beginner");
      const btnE = document.getElementById("btn-expert");
      if (btnB) btnB.classList.toggle("active", l === "beginner");
      if (btnE) btnE.classList.toggle("active", l === "expert");
      updateSidePanel();
    }

    /* ── Initialise ── */
    render();

    /* Expose only the methods needed by onclick handlers */
    return { go, goToStep, setLevel };
  })();
</script>
